version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: vapt
      POSTGRES_PASSWORD: vapt
      POSTGRES_DB: vapt
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://vapt:vapt@db:5432/vapt
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: 'replace-me-with-fernet-key'
    ports:
      - '5000:5000'
    depends_on:
      - db
      - redis
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://vapt:vapt@db:5432/vapt
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: 'replace-me-with-fernet-key'
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  db_data:
