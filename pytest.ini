[pytest]
# Pytest configuration for VAPT project

testpaths = tests
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Plugins and options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=backend
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-branch
    --cov-fail-under=50

# Markers for test categorization
markers =
    unit: Unit tests for individual modules
    integration: Integration tests between components
    e2e: End-to-end tests covering full workflows
    slow: Tests that take longer to run
    requires_db: Tests that require a database connection
    requires_redis: Tests that require Redis
    api: Tests for API endpoints
    security: Security-related tests

# Coverage configuration
[coverage:run]
branch = True
source = backend
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
